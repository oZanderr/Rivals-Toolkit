pre-commit:
  parallel: true
  commands:
    prettier:
      run: pnpm format:web:check
      glob: "src/**/*.{ts,tsx,js,css}"
    eslint:
      run: pnpm lint:web
      glob: "src/**/*.{ts,tsx}"
    tsc:
      run: pnpm exec tsc --noEmit
    rustfmt:
      run: pnpm format:rust:check
      glob: "src-tauri/**/*.rs"
    clippy:
      run: pnpm lint:rust
      glob: "src-tauri/**/*.rs"
