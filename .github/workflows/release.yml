name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Resolve release tag
        id: vars
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Validate release tag format
        shell: pwsh
        run: |
          $tag = "${{ steps.vars.outputs.tag }}"
          if ($tag -notmatch '^v\d+\.\d+\.\d+([-.].+)?$') {
            throw "Tag '$tag' is invalid. Expected format like v0.1.0 or v0.1.0-beta.1"
          }

      - name: Generate changelog
        id: changelog
        shell: pwsh
        run: |
          $tag = "${{ steps.vars.outputs.tag }}"
          $prevTag = git tag --sort=-creatordate | Where-Object { $_ -ne $tag } | Select-Object -First 1

          if ($prevTag) {
            $changeLines = git --no-pager log --reverse --no-merges --pretty=format:"- %s (%h)" "$prevTag..$tag"
          }
          else {
            $changeLines = git --no-pager log --reverse --no-merges --pretty=format:"- %s (%h)" "$tag"
          }

          if (-not $changeLines) {
            $changeLines = "- No changes detected in git log for this release range."
          }

          $changelog = ($changeLines -join "`n")

          $delim = "CHANGELOG_$(New-Guid)"
          "text<<$delim" | Add-Content $env:GITHUB_OUTPUT
          $changelog | Add-Content $env:GITHUB_OUTPUT
          $delim | Add-Content $env:GITHUB_OUTPUT

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows executable (no bundles)
        run: pnpm tauri build --no-bundle

      - name: Verify release executable exists
        shell: pwsh
        run: |
          $exePath = "src-tauri/target/release/oinkers-toolkit.exe"
          if (-not (Test-Path $exePath)) {
            throw "Expected executable not found at $exePath"
          }

      - name: Package release zip
        shell: pwsh
        run: |
          $tag = "${{ steps.vars.outputs.tag }}"
          $assetBase = "oinkers-toolkit-$tag-windows-x64"
          $repoRoot = $env:GITHUB_WORKSPACE
          $releaseDir = Join-Path $repoRoot "src-tauri/target/release"
          $zipPath = Join-Path $releaseDir "$assetBase.zip"
          $stagingRoot = Join-Path $releaseDir "_package"
          $stagingDir = Join-Path $stagingRoot $assetBase

          $exePath = Join-Path $releaseDir "oinkers-toolkit.exe"
          $oo2corePath = Join-Path $repoRoot "src-tauri/resources/oo2core_9_win64.dll"

          foreach ($required in @($exePath, $oo2corePath)) {
            if (-not (Test-Path $required)) {
              throw "Required release file not found: $required"
            }
          }

          if (Test-Path $stagingRoot) {
            Remove-Item $stagingRoot -Recurse -Force
          }
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          New-Item -ItemType Directory -Path $stagingDir -Force | Out-Null

          # Keep executable name clean while versioning the archive itself.
          Copy-Item $exePath "$stagingDir/oinkers-toolkit.exe" -Force
          Copy-Item $oo2corePath "$stagingDir/oo2core_9_win64.dll" -Force

          Compress-Archive -Path "$stagingDir/*" -DestinationPath $zipPath -CompressionLevel Optimal

      - name: Create or update GitHub Release with zip package
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.vars.outputs.tag }}"
          $assetName = "oinkers-toolkit-$tag-windows-x64.zip"
          $assetPath = Join-Path $env:GITHUB_WORKSPACE "src-tauri/target/release/$assetName"
          $notesPath = Join-Path $env:RUNNER_TEMP "release-notes.md"

          if (-not (Test-Path $assetPath)) {
            throw "Expected release asset not found at $assetPath"
          }

          $checksum = (Get-FileHash -Algorithm SHA256 $assetPath).Hash.ToLower()

          # Write standalone checksum file
          $checksumFileName = "$assetName.sha256"
          $checksumFilePath = Join-Path $env:RUNNER_TEMP $checksumFileName
          "$checksum  $assetName" | Set-Content -Path $checksumFilePath -Encoding utf8 -NoNewline

          $repo = "${{ github.repository }}"
          $downloadUrl = "https://github.com/$repo/releases/download/$tag/$assetName"
          $checksumUrl = "https://github.com/$repo/releases/download/$tag/$checksumFileName"

          $changelog = "${{ steps.changelog.outputs.text }}"

          @(
            "## Downloads",
            "",
            "| File | |",
            "| ---- | - |",
            "| [$assetName]($downloadUrl) | [checksum]($checksumUrl) |",
            "",
            "## Changelog",
            "",
            $changelog
          ) -join "`n" | Set-Content -Path $notesPath -Encoding utf8

          gh release view "$tag" *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create "$tag" `
              --title "Oinkers Toolkit $tag" `
              --notes-file "$notesPath" `
              --prerelease=${{ contains(steps.vars.outputs.tag, '-') }}
          }
          else {
            gh release edit "$tag" `
              --title "Oinkers Toolkit $tag" `
              --notes-file "$notesPath"
          }

          gh release upload "$tag" "$assetPath" --clobber
          gh release upload "$tag" "$checksumFilePath" --clobber

      - name: Notify Discord on release success
        if: ${{ success() }}
        shell: pwsh
        env:
          DISCORD_RELEASE_WEBHOOK: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
        run: |
          if (-not $env:DISCORD_RELEASE_WEBHOOK) {
            Write-Host "DISCORD_RELEASE_WEBHOOK is not configured; skipping Discord notification."
            exit 0
          }

          $tag = "${{ steps.vars.outputs.tag }}"
          $assetName = "oinkers-toolkit-$tag-windows-x64.zip"
          $repo = "${{ github.repository }}"
          $releaseUrl = "https://github.com/$repo/releases/tag/$tag"
          $downloadUrl = "https://github.com/$repo/releases/download/$tag/$assetName"

          $changelog = "${{ steps.changelog.outputs.text }}"

          # Discord embed description is capped at 4096 chars; trim if needed.
          $maxLen = 4000
          if ($changelog.Length -gt $maxLen) {
            $changelog = $changelog.Substring(0, $maxLen) + "`n... [see full changelog]($releaseUrl)"
          }

          $payload = @{
            thread_name = "Oinkers Toolkit - $tag"
            content = ""
            embeds = @(
              @{
                color = 5763719
                description = $changelog
                fields = @(
                  @{ name = "Release"; value = "[View release]($releaseUrl)"; inline = $true },
                  @{ name = "Download"; value = "[$assetName]($downloadUrl)"; inline = $true }
                )
                timestamp = (Get-Date).ToUniversalTime().ToString("o")
              }
            )
          } | ConvertTo-Json -Depth 8

          Invoke-RestMethod `
            -Uri $env:DISCORD_RELEASE_WEBHOOK `
            -Method Post `
            -ContentType "application/json" `
            -Body $payload
